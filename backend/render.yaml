services:
  - type: web
    name: school-college-transport-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        value: https://frontend-zeta-woad-10.vercel.app
      - key: ENABLE_CRON
        value: true
      - key: GOOGLE_CLIENT_ID
        value: 213808604332-fq9678tms12kutcjm7coafkjmbehhr19.apps.googleusercontent.com
